const SB_H = { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' };

function sbFetch(path, opts) {
  return fetch(SB_URL + path, Object.assign({ headers: SB_H }, opts))
    .then(function(r) {
      var ct = r.headers.get('content-type') || '';
      if (ct.indexOf('json') > -1) {
        return r.json().then(function(d) { return { data: r.ok ? d : null, error: r.ok ? null : d }; });
      }
      return { data: null, error: r.ok ? null : { message: r.status } };
    })
    .catch(function(e) { return { data: null, error: e }; });
}

var sb = {
  from: function(table) {
    var filters = [], orders = [], selCols = '*', isSingle = false;
    var limitN = null;
    var api = {
      select:  function(c) { selCols = c || '*'; return api; },
      eq:      function(c, v) { filters.push(c + '=eq.'  + encodeURIComponent(v)); return api; },
      neq:     function(c, v) { filters.push(c + '=neq.' + encodeURIComponent(v)); return api; },
      gte:     function(c, v) { filters.push(c + '=gte.' + encodeURIComponent(v)); return api; },
      lte:     function(c, v) { filters.push(c + '=lte.' + encodeURIComponent(v)); return api; },
      gt:      function(c, v) { filters.push(c + '=gt.'  + encodeURIComponent(v)); return api; },
      lt:      function(c, v) { filters.push(c + '=lt.'  + encodeURIComponent(v)); return api; },
      in:      function(c, a) { filters.push(c + '=in.(' + a.map(function(x){return encodeURIComponent(x);}).join(',') + ')'); return api; },
      not:     function(c, op, v) { filters.push(c + '=not.' + op + '.' + (v === null ? 'null' : encodeURIComponent(v))); return api; },
      is:      function(c, v) { filters.push(c + '=is.' + (v === null ? 'null' : encodeURIComponent(v))); return api; },
      like:    function(c, v) { filters.push(c + '=like.' + encodeURIComponent(v)); return api; },
      limit:   function(n) { limitN = n; return api; },
      order:   function(c, o) { orders.push(c + '.' + ((!o || o.ascending !== false) ? 'asc' : 'desc')); return api; },
      single:  function() { isSingle = true; return api; },
      then:   function(resolve, reject) {
        var qs = ['select=' + selCols].concat(filters);
        if (orders.length) qs.push('order=' + orders.join(','));
        if (limitN !== null) qs.push('limit=' + limitN);
        var h = Object.assign({}, SB_H);
        if (isSingle) h['Accept'] = 'application/vnd.pgrst.object+json';
        return fetch(SB_URL + '/rest/v1/' + table + '?' + qs.join('&'), { headers: h })
          .then(function(r) {
            return r.text().then(function(t) {
              var d = t ? JSON.parse(t) : null;
              return resolve({ data: d, error: r.ok ? null : { message: t } });
            });
          }).catch(function(e) { return resolve({ data: null, error: e }); });
      },
      insert: function(body) {
        return sbFetch('/rest/v1/' + table, { method: 'POST',
          headers: Object.assign({}, SB_H, { Prefer: 'return=representation' }),
          body: JSON.stringify(body) });
      },
      upsert: function(body, opts) {
        var _single = false;
        var api = {
          select: function() { return api; },
          single: function() { _single = true; return api; },
          then: function(resolve, reject) {
            var h = Object.assign({}, SB_H, { Prefer: 'resolution=merge-duplicates,return=representation' });
            if (_single) h['Accept'] = 'application/vnd.pgrst.object+json';
            // 🐛 Fix: pasar on_conflict como query param para que PostgREST
            // sepa qué constraint usar al resolver duplicados
            var url = SB_URL + '/rest/v1/' + table;
            if (opts && opts.onConflict) {
              url += '?on_conflict=' + encodeURIComponent(opts.onConflict);
            }
            return fetch(url, {
              method: 'POST', headers: h, body: JSON.stringify(body)
            }).then(function(r) {
              return r.text().then(function(t) {
                var d = t ? JSON.parse(t) : null;
                return resolve({ data: d, error: r.ok ? null : { message: t } });
              });
            }).catch(function(e) { return resolve({ data: null, error: e }); });
          }
        };
        return api;
      },
      update: function(body) {
        return {
          eq: function(c, v) {
            return sbFetch('/rest/v1/' + table + '?' + c + '=eq.' + encodeURIComponent(v),
              { method: 'PATCH', headers: Object.assign({}, SB_H, { Prefer: 'return=representation' }),
                body: JSON.stringify(body) });
          }
        };
      },
      delete: function() {
        return {
          eq: function(c, v) {
            return sbFetch('/rest/v1/' + table + '?' + c + '=eq.' + encodeURIComponent(v),
              { method: 'DELETE', headers: SB_H });
          }
        };
      }
    };
    return api;
  },
  storage: {
    from: function(bucket) {
      return {
        upload: function(path, file) {
          return fetch(SB_URL + '/storage/v1/object/' + bucket + '/' + path, {
            method: 'POST', headers: { apikey: SB_KEY, Authorization: 'Bearer ' + SB_KEY },
            body: file })
            .then(function(r) { return { error: r.ok ? null : { message: r.status } }; })
            .catch(function(e) { return { error: e }; });
        },
        getPublicUrl: function(path) {
          return { data: { publicUrl: SB_URL + '/storage/v1/object/public/' + bucket + '/' + path } };
        },
        remove: function(paths) {
          return fetch(SB_URL + '/storage/v1/object/' + bucket, {
            method: 'DELETE', headers: SB_H, body: JSON.stringify({ prefixes: paths }) })
            .then(function(r) { return { error: r.ok ? null : { message: r.status } }; })
            .catch(function(e) { return { error: e }; });
        }
      };
    }
  }
};

// ── STATE ────────────────────────────────────────────────────────────────────────────────
let currentCheck = 'devoluciones';
let currentDate  = new Date().toISOString().slice(0,10);

async function upsertRecord(check_type, date, shift, task_id, responsable, completed, observation) {
  const {data, error} = await sb.from('check_records')
    .upsert({check_type,date,shift,task_id,responsable,completed,observation,updated_at:new Date().toISOString()},
            {onConflict:'check_type,date,shift,task_id'})
    .select().single();
  if (error) throw error;
  return data;
}
async function fetchRecordsMap(check_type, date) {
  const {data} = await sb.from('check_records').select('*').eq('check_type',check_type).eq('date',date);
  return Object.fromEntries((data||[]).map(r=>[r.task_id,r]));
}
async function fetchPhotos(record_id) {
  const {data} = await sb.from('check_photos').select('*').eq('record_id',record_id).order('uploaded_at');
  return data||[];
}
async function uploadPhoto(file, record_id) {
  // Guardar como base64 directamente en la DB (evita Supabase Storage bloqueado por proxy)
  const dataUrl = await new Promise((res, rej) => {
    const reader = new FileReader();
    reader.onload  = e => res(e.target.result);
    reader.onerror = rej;
    reader.readAsDataURL(file);
  });
  const {error} = await sb.from('check_photos')
    .insert({record_id, photo_url: dataUrl, orig_name: file.name});
  if (error) throw new Error(error.message || 'Error al guardar foto');
  return dataUrl;
}
async function removePhoto(photo_id, photo_url) {
  // Solo elimina el registro DB (no hay storage externo)
  await sb.from('check_photos').delete().eq('id', photo_id);
}

// ── RENDER CHECK ──────────────────────────────────────────────────────────────
async function renderCheck() {
  if (!sb) return;
  document.getElementById('view-check').innerHTML = '<p class="text-center text-gray-400 py-12">⏳ Cargando...</p>';
  const check   = CHECKS[currentCheck];
  const records = await fetchRecordsMap(currentCheck, currentDate);
  let html = `<h2 class="text-lg font-black text-[#0053e2] mb-1">${check.icon} ${check.label}</h2>
              <p class="text-sm text-gray-400 mb-5">${currentDate}</p>`;
  for (const [shift, tasks] of Object.entries(check.shifts)) {
    const done = tasks.filter(t=>records[t.id]?.completed).length;
    const pct  = tasks.length ? Math.round(done/tasks.length*100) : 0;
    const pCls = pct>=80?'bg-green-100 text-green-700':pct>=50?'bg-yellow-100 text-yellow-700':'bg-red-100 text-red-600';
    const bCls = pct>=80?'bg-green-500':pct>=50?'bg-yellow-400':'bg-red-400';
    // Responsable del turno: usar el primero que exista en los registros
    const shiftResp = tasks.map(t=>records[t.id]?.responsable).find(r=>r) || '';
    let cards = '';
    for (const task of tasks) {
      const rec    = records[task.id]||null;
      const photos = rec ? await fetchPhotos(rec.id) : [];
      cards += buildCard(task, rec, photos, shift);
    }
    
    let finishBtn = '';
    if (currentCheck === 'precio') {
      finishBtn = `<div class="mt-4 p-4 bg-white rounded-2xl border-2 border-dashed border-blue-200 text-center shadow-sm max-w-md mx-auto no-print">
        <p class="text-xs font-semibold text-gray-500 mb-2.5">¿Finalizaste el recorrido de Comunicación de Precio del Turno ${shift}?</p>
        <button onclick="generatePrecioPDF('${shift}')" class="w-full px-5 py-2.5 bg-green-600 hover:bg-green-700 text-white font-bold rounded-xl text-xs transition-all flex items-center justify-center gap-1.5 shadow shadow-green-500/10 mx-auto">
          Finalizar y Generar PDF Turno ${shift}
        </button>
      </div>`;
    }
    
    html += `<section class="mb-8">
      <div class="flex items-center gap-3 mb-3">
        <span class="font-black text-base ${shift==='AM'?'text-yellow-700':shift==='PM'?'text-indigo-700':'text-emerald-700'}">${shift==='AM'?'':shift==='PM'?'':''} ${shift==='DIARIO'?'Control Diario':'Turno '+shift}</span>
        <span class="text-xs font-bold px-2 py-0.5 rounded-full ${pCls}">${done}/${tasks.length} • ${pct}%</span>
        <div class="flex-1 bg-gray-200 rounded-full h-2"><div class="h-2 rounded-full ${bCls}" style="width:${pct}%"></div></div>
      </div>
      <div class="bg-white rounded-2xl border-2 border-gray-100 px-4 py-3 mb-4 flex items-center gap-3">
        <span class="text-xs font-bold text-gray-500 whitespace-nowrap"> Responsable turno: <span class="text-red-500">*</span></span>
        <input type="text" id="resp-${shift}" value="${shiftResp}" placeholder="Nombre de quien realiza el turno (obligatorio)"
          class="flex-1 border-2 border-gray-200 rounded-xl px-3 py-2 text-sm bg-gray-50 focus:ring-2 focus:ring-[#0053e2] focus:outline-none"
          oninput="this.classList.remove('border-red-400')"/>
      </div>
      <div class="space-y-3">${cards}</div>
      ${finishBtn}
    </section>`;
  }
  document.getElementById('view-check').innerHTML = html;
}

function buildCard(task, rec, photos, shift) {
  const done = rec?.completed;
  const photoHTML = photos.map(p=>`
    <div class="relative group">
      <a href="${p.photo_url}" target="_blank"><img src="${p.photo_url}" class="w-20 h-20 object-cover rounded-xl border shadow-sm"/></a>
      <button onclick="delPhoto(${p.id},'${p.photo_url}')"
        class="absolute -top-2 -right-2 w-5 h-5 bg-red-500 hover:bg-red-600 text-white rounded-full text-xs flex items-center justify-center font-bold shadow">×</button>
    </div>`).join('');
  return `<div id="card-${task.id}" class="bg-white rounded-2xl shadow-sm border-2 ${done?'border-green-400':'border-gray-200'} overflow-hidden shift-${shift.toLowerCase()}">
    <div class="flex items-start gap-3 px-4 pt-4 pb-2">
      <span class="mt-0.5 w-6 h-6 rounded-full border-2 flex items-center justify-center text-xs font-bold flex-shrink-0 ${done?'bg-green-500 border-green-500 text-white':'border-gray-300 text-transparent'}">✓</span>
      <div class="flex-1"><p class="text-xs font-mono text-gray-400 mb-0.5">⏰ ${task.h}</p><p class="font-semibold text-sm">${task.t}</p></div>
      <span class="text-xs font-bold px-2 py-0.5 rounded-full flex-shrink-0 ${done?'bg-green-100 text-green-700':'bg-yellow-50 text-yellow-700'}">${done?'✓ OK':'Pendiente'}</span>
    </div>
    <div class="px-4 pb-4 space-y-3">
      <textarea id="obs-${task.id}" rows="2" placeholder="📝 Observación / Comentario…"
        class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm resize-none bg-gray-50 focus:ring-2 focus:ring-[#0053e2] focus:outline-none">${rec?.observation||''}</textarea>
      <div>
        <label class="text-xs font-semibold text-gray-400 block mb-1">📷 Agregar fotos (cámara o galería)</label>
        <input type="file" id="file-${task.id}" multiple accept="image/*"
          class="w-full text-sm text-gray-500 file:mr-3 file:py-1.5 file:px-4 file:rounded-xl file:border-0 file:text-sm file:font-semibold file:bg-[#0053e2] file:text-white hover:file:bg-blue-700 cursor-pointer"/>
      </div>
      ${photos.length?`<div class="flex flex-wrap gap-2">${photoHTML}</div>`:''}
      <div class="flex items-center gap-4 pt-1">
        <label class="flex items-center gap-2 cursor-pointer select-none">
          <input type="checkbox" id="chk-${task.id}" ${done?'checked':''} class="w-4 h-4 accent-[#0053e2]"/>
          <span class="text-sm font-semibold">Marcar cumplido</span>
        </label>
        <button onclick="saveTask('${task.id}','${shift}', event)"
          class="ml-auto px-5 py-2 bg-[#0053e2] hover:bg-blue-700 text-white text-sm font-bold rounded-xl">Guardar 💾</button>
      </div>
    </div>
  </div>`;
}

// Comprime imagen antes de subir (máx 1024px, calidad 70%)
function compressImage(file, maxPx=1024, quality=0.70) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
      const canvas = document.createElement('canvas');
      canvas.width  = Math.round(img.width  * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      canvas.toBlob(blob => res(new File([blob], file.name.replace(/\.[^.]+$/, '.jpg'),
        { type:'image/jpeg' })), 'image/jpeg', quality);
    };
    img.src = URL.createObjectURL(file);
  });
}

async function saveTask(task_id, shift, e) {
  const btn = e.target; btn.textContent='⏳'; btn.disabled=true;
  try {
    const responsable = (document.getElementById(`resp-${shift}`)?.value||'').trim();
    if (!responsable) {
      toast('⚠️ Debes ingresar el responsable del turno', 'red');
      document.getElementById(`resp-${shift}`)?.classList.add('border-red-400');
      btn.textContent='Guardar 💾'; btn.disabled=false; return;
    }
    const rec = await upsertRecord(currentCheck, currentDate, shift, task_id,
      responsable,
      document.getElementById(`chk-${task_id}`).checked ? 1 : 0,
      document.getElementById(`obs-${task_id}`).value.trim());
    const files = Array.from(document.getElementById(`file-${task_id}`).files);
    if (files.length) {
      btn.textContent = `⏳ Subiendo fotos (0/${files.length})…`;
      for (let i = 0; i < files.length; i++) {
        btn.textContent = `⏳ Foto ${i+1}/${files.length}…`;
        const compressed = await compressImage(files[i]);
        await uploadPhoto(compressed, rec.id);
      }
    }
    toast('✅ Guardado en línea');
    renderCheck();
  } catch(err) { toast('❌ '+err.message,'red'); btn.textContent='Guardar 💾'; btn.disabled=false; }
}
async function delPhoto(photo_id, photo_url) {
  if (!confirm('¿Eliminar esta foto?')) return;
  await removePhoto(photo_id, photo_url);
  toast('🗑️ Foto eliminada');
  renderCheck();
}

async function renderHistory() {
  document.getElementById('view-history').innerHTML = '<p class="text-center text-gray-400 py-12">⏳ Cargando historial…</p>';
  const {data:records} = await sb.from('check_records').select('*').order('date',{ascending:false}).order('check_type').order('shift');
  const {data:photos}  = await sb.from('check_photos').select('*');
  if (!records?.length) {
    document.getElementById('view-history').innerHTML = `
      <h2 class="text-lg font-black text-[#0053e2] mb-4">🕒 Historial</h2>
      <div class="bg-white rounded-2xl border p-12 text-center text-gray-400">
        <p class="text-4xl mb-3">📭</p><p class="font-semibold">Sin registros aún.</p>
        <button onclick="showView('check')" class="mt-4 text-sm text-[#0053e2] font-semibold hover:underline">← Volver al check</button>
      </div>`; return;
  }
  // Fotos por record_id
  const pbr = {};
  (photos||[]).forEach(p => { if(!pbr[p.record_id]) pbr[p.record_id]=[]; pbr[p.record_id].push(p); });
  // Agrupar: fecha → check_type → shift → [records]
  // Deduplicar por task_id: si hay dos registros del mismo task en el mismo día/turno, queda el mas reciente
  const seen = {};
  const deduped = records.filter(r => {
    const key = `${r.date}|${r.check_type}|${r.shift}|${r.task_id}`;
    if (seen[key]) return false;
    seen[key] = true; return true;
  });
  const byDate = {};
  deduped.forEach(r => {
    if(!byDate[r.date])                        byDate[r.date]={};
    if(!byDate[r.date][r.check_type])          byDate[r.date][r.check_type]={};
    if(!byDate[r.date][r.check_type][r.shift]) byDate[r.date][r.check_type][r.shift]=[];
    byDate[r.date][r.check_type][r.shift].push(r);
  });

  const shiftStyle = {
    AM:{ icon:'☀️', hdr:'bg-yellow-50 border-yellow-200', badge:'bg-yellow-100 text-yellow-700' },
    PM:{ icon:'🌙', hdr:'bg-indigo-50 border-indigo-200', badge:'bg-indigo-100 text-indigo-700' },

  let html = `<div class="flex items-center justify-between mb-5 flex-wrap gap-2">
    <h2 class="text-lg font-black text-[#0053e2]">🕒 Historial de Registros</h2>
    <button onclick="showView('check')" class="text-sm text-[#0053e2] font-semibold hover:underline no-print">← Volver</button>
  </div>`;

  for (const [date, byCheck] of Object.entries(byDate)) {
    const allRecs = Object.values(byCheck).flatMap(s=>Object.values(s).flat());
    const done=allRecs.filter(r=>r.completed).length, pct=Math.round(done/allRecs.length*100);
    const pCls=pct>=80?'bg-green-100 text-green-700':pct>=50?'bg-yellow-100 text-yellow-700':'bg-red-100 text-red-600';

    html += `<div id="hist-${date}" class="mb-10">
      <div class="flex items-center gap-3 mb-4 px-1">
        <span class="text-base font-black text-gray-700">📅 ${date}</span>
        <span class="text-xs font-bold px-2 py-0.5 rounded-full ${pCls}">${done}/${allRecs.length} · ${pct}% total</span>
      </div>`;

    for (const [cid, byShift] of Object.entries(byCheck)) {
      const chk    = CHECKS[cid];
      const chkRecs= Object.values(byShift).flat();
      const chkDone=chkRecs.filter(r=>r.completed).length, chkPct=Math.round(chkDone/chkRecs.length*100);
      const chkCls =chkPct>=80?'bg-green-100 text-green-700':chkPct>=50?'bg-yellow-100 text-yellow-700':'bg-red-100 text-red-600';

          <span class="font-black text-gray-800 text-sm">${chk?.icon||''} ${chk?.label||cid}</span>
          <span class="text-xs font-bold px-2 py-0.5 rounded-full ${chkCls}">${chkDone}/${chkRecs.length} · ${chkPct}%</span>
        </div>`;

      for (const [shift, recs] of Object.entries(byShift)) {
        const ss     = shiftStyle[shift]||shiftStyle.AM;
        const sdone  = recs.filter(r=>r.completed).length, spct=Math.round(sdone/recs.length*100);
        const sCls   = spct>=80?'bg-green-100 text-green-700':spct>=50?'bg-yellow-100 text-yellow-700':'bg-red-100 text-red-600';
        const blockId= `hist-${date}-${cid}-${shift}`;

        html += `<div id="${blockId}" class="border-t ${ss.hdr}">

            <div class="flex items-center gap-2">
              <span class="font-bold text-sm text-gray-700">${ss.icon} Turno ${shift}</span>

            <div class="flex gap-2 no-print">
              <button onclick="printBlock('${blockId}')" class="px-3 py-1.5 bg-[#0053e2] hover:bg-blue-700 text-white text-xs font-bold rounded-xl">🖨️ Imprimir</button>

              ${recs.map(r=>{

                return `<tr class="${r.completed?'bg-green-50/40':''}">

                  <td class="px-4 py-3 no-print">${rp.length
                    ?`<div class="flex gap-1 flex-wrap">${rp.map(p=>`<a href="${p.photo_url}" target="_blank"><img src="${p.photo_url}" class="w-10 h-10 object-cover rounded-lg border"/></a>`).join('')}</div>`

function printBlock(blockId) {
  const viewHistory = document.getElementById('view-history');
  const target = document.getElementById(blockId);
  if (!target) return;
  // Guarda y oculta todos los bloques hist-
  const all = viewHistory.querySelectorAll('[id^="hist-"]');
  all.forEach(el => { el._orig = el.style.display; el.style.display = 'none'; });
  // Muestra el bloque objetivo Y todos sus ancestros hasta view-history
  let node = target;
  while (node && node !== viewHistory) {
    node.style.display = '';
    node = node.parentElement;
  }
  window.print();
  // Restaura todo
  all.forEach(el => { el.style.display = el._orig || ''; });
}

// Precarga una imagen y devuelve {dataUrl, w, h, format} listos para jsPDF
function loadImageForPDF(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => {
      // Re-encode SIEMPRE a JPEG via canvas para que jsPDF no tenga problemas
      // con PNG, HEIC convertido, o data URLs raros del celular
      try {
        const canvas = document.createElement('canvas');
        const maxPx  = 900; // tope para que el PDF no pese 50MB
        const scale  = Math.min(1, maxPx / Math.max(img.naturalWidth, img.naturalHeight));
        canvas.width  = Math.round(img.naturalWidth  * scale);
        canvas.height = Math.round(img.naturalHeight * scale);
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve({
          dataUrl: canvas.toDataURL('image/jpeg', 0.82),
          w: canvas.width,
          h: canvas.height
        });
      } catch (e) { reject(e); }
    };
    img.onerror = () => reject(new Error('No se pudo cargar imagen'));
    img.src = src;
  });
}

async function generatePrecioPDF(selectedShift) {
  const btn = event?.target;
  const originalText = btn?.textContent;
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Generando PDF...'; }

  try {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });

    // Constantes de layout (en mm)
    const PAGE_W   = 210;
    const PAGE_H   = 297;
    const MARGIN_L = 15;
    const MARGIN_R = 15;
    const MARGIN_B = 20;
    const CONTENT_W = PAGE_W - MARGIN_L - MARGIN_R;

    // ── Header ────────────────────────────────────────────────────────────
    pdf.setFillColor(0, 83, 226);
    pdf.rect(0, 0, PAGE_W, 30, 'F');
    pdf.setTextColor(255, 255, 255);
    pdf.setFontSize(16);
    pdf.setFont('helvetica', 'bold');
    pdf.text('REPORTE DE OPORTUNIDADES EN PRECIO', MARGIN_L, 12);
    pdf.setFontSize(11);
    pdf.text('Comunicación de Precio — Lider — Turno ' + selectedShift, MARGIN_L, 19);
    pdf.text('Fecha: ' + currentDate, 150, 19);

    const check   = CHECKS['precio'];
    const records = await fetchRecordsMap('precio', currentDate);
    const tasks   = check.shifts[selectedShift];

    let y = 42;

    // Helper: garantiza que haya espacio o agrega página
    const ensureSpace = (needed) => {
      if (y + needed > PAGE_H - MARGIN_B) {
        pdf.addPage();
        y = 20;
      }
    };

    pdf.setTextColor(0, 83, 226);
    pdf.setFontSize(13);
    pdf.setFont('helvetica', 'bold');
    pdf.text('Turno ' + selectedShift, MARGIN_L, y);
    y += 8;

    const shiftResp = tasks.map(t=>records[t.id]?.responsable).find(r=>r) || 'No registrado';
    pdf.setTextColor(100, 116, 139);
    pdf.setFontSize(9.5);
    pdf.setFont('helvetica', 'normal');
    pdf.text('Responsable del Turno: ' + shiftResp, MARGIN_L, y);
    y += 10;

    let photoFailures = 0;
    let photoTotal    = 0;

    for (const task of tasks) {
      const rec    = records[task.id];
      const obs    = (rec?.observation || 'Sin observaciones registradas.').trim();
      const photos = rec ? await fetchPhotos(rec.id) : [];

      // ── Título de la tarea (con wrap) ─────────────────────────────────
      const titleLines = pdf.splitTextToSize('• ' + task.t, CONTENT_W);
      ensureSpace(titleLines.length * 5 + 4);
      pdf.setTextColor(30, 41, 59);
      pdf.setFontSize(11);
      pdf.setFont('helvetica', 'bold');
      pdf.text(titleLines, MARGIN_L, y);
      y += titleLines.length * 5 + 1;

      // ── Estado ────────────────────────────────────────────────────────
      pdf.setFontSize(9.5);
      pdf.setFont('helvetica', 'normal');
      pdf.setTextColor(71, 85, 105);
      ensureSpace(5);
      pdf.text('Estado: ' + (rec?.completed ? 'OPORTUNIDAD REPORTADA' : 'CONFORME / SIN OBSERVACIONES'), MARGIN_L + 5, y);
      y += 5;

      // ── Comentarios (con wrap real) ───────────────────────────────────
      const obsLines = pdf.splitTextToSize('Comentarios: ' + obs, CONTENT_W - 5);
      ensureSpace(obsLines.length * 4.5 + 2);
      pdf.text(obsLines, MARGIN_L + 5, y);
      y += obsLines.length * 4.5 + 3;

      // ── Fotos: 2 por fila, aspect-ratio preservado, max 80x60 mm ──────
      if (photos.length > 0) {
        ensureSpace(8);
        pdf.setFont('helvetica', 'bold');
        pdf.setTextColor(0, 83, 226);
        pdf.text(`Evidencias Fotográficas (${photos.length}):`, MARGIN_L + 5, y);
        pdf.setFont('helvetica', 'normal');
        pdf.setTextColor(71, 85, 105);
        y += 5;

        const COLS    = 2;
        const GAP     = 5;
        const SLOT_W  = (CONTENT_W - GAP) / COLS;          // ~85 mm
        const MAX_H   = 60;                                 // alto máximo por foto
        let col = 0;
        let rowMaxH = 0;
        let rowStartY = y;

        for (const p of photos) {
          photoTotal++;
          try {
            const loaded = await loadImageForPDF(p.photo_url);
            // Calcular dims preservando aspect ratio
            const ratio = loaded.w / loaded.h;
            let drawW = SLOT_W;
            let drawH = drawW / ratio;
            if (drawH > MAX_H) {
              drawH = MAX_H;
              drawW = drawH * ratio;
            }

            // Salto de fila si no cabe a lo alto
            if (rowStartY + drawH > PAGE_H - MARGIN_B) {
              pdf.addPage();
              y = 20;
              rowStartY = y;
              col = 0;
              rowMaxH = 0;
            }

            const x = MARGIN_L + col * (SLOT_W + GAP) + (SLOT_W - drawW) / 2;
            pdf.addImage(loaded.dataUrl, 'JPEG', x, rowStartY, drawW, drawH, undefined, 'FAST');

            // Borde sutil alrededor de la foto
            pdf.setDrawColor(203, 213, 225);
            pdf.setLineWidth(0.2);
            pdf.rect(x, rowStartY, drawW, drawH);

            if (drawH > rowMaxH) rowMaxH = drawH;
            col++;
            if (col >= COLS) {
              col = 0;
              rowStartY += rowMaxH + GAP;
              y = rowStartY;
              rowMaxH = 0;
            }
          } catch (e) {
            console.error('Error al embedar foto en PDF', p?.orig_name, e);
            photoFailures++;
            // Placeholder de error
            const x = MARGIN_L + col * (SLOT_W + GAP);
            pdf.setFillColor(254, 226, 226);
            pdf.rect(x, rowStartY, SLOT_W, 20, 'F');
            pdf.setTextColor(185, 28, 28);
            pdf.setFontSize(8);
            pdf.text('No se pudo cargar foto: ' + (p?.orig_name||''), x + 2, rowStartY + 11);
            pdf.setTextColor(71, 85, 105);
            pdf.setFontSize(9.5);
            if (20 > rowMaxH) rowMaxH = 20;
            col++;
            if (col >= COLS) {
              col = 0;
              rowStartY += rowMaxH + GAP;
              y = rowStartY;
              rowMaxH = 0;
            }
          }
        }
        // Cerrar última fila si quedó incompleta
        if (col !== 0) {
          rowStartY += rowMaxH + GAP;
          y = rowStartY;
        }
        y += 4;
      }

      // Separador entre tareas
      ensureSpace(4);
      pdf.setDrawColor(226, 232, 240);
      pdf.setLineWidth(0.3);
      pdf.line(MARGIN_L, y, PAGE_W - MARGIN_R, y);
      y += 6;
    }

    // ── Footer con paginación ─────────────────────────────────────────────
    const totalPages = pdf.internal.getNumberOfPages();
    for (let i = 1; i <= totalPages; i++) {
      pdf.setPage(i);
      pdf.setFontSize(8);
      pdf.setTextColor(148, 163, 184);
      pdf.text(`Página ${i} de ${totalPages}`, PAGE_W - MARGIN_R, PAGE_H - 8, { align: 'right' });
      pdf.text(`Check SAC · Comunicación Precio · ${currentDate}`, MARGIN_L, PAGE_H - 8);
    }

    pdf.save(`Reporte_Precio_Oportunidades_${selectedShift}_${currentDate}.pdf`);

    if (photoFailures > 0) {
      toast(` PDF generado, pero ${photoFailures}/${photoTotal} fotos no se pudieron incrustar.`);
    } else if (photoTotal > 0) {
      toast(` PDF generado con ${photoTotal} foto(s) incrustada(s).`);
    } else {
      toast(' PDF generado (sin fotos cargadas).');
    }
  } catch (err) {
    console.error('Error generando PDF:', err);
    alert(' Error generando PDF: ' + (err?.message || err));
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = originalText; }
  }
}

async function sharePDF(blockId, date, checkLabel) {
  const el = document.getElementById(blockId);
  if (!el) return;
  const btn = event.target;
  btn.textContent = '⏳ Generando...';
  btn.disabled = true;
  try {
    const noPrint = el.querySelectorAll('.no-print');
    noPrint.forEach(e => e.style.visibility = 'hidden');
    // Captura el elemento completo con sus dimensiones reales
    const elW = el.scrollWidth;
    const elH = el.scrollHeight;
    const canvas = await html2canvas(el, {
      scale: 1.5,
      useCORS: true,
      backgroundColor: '#ffffff',
      logging: false,
      width:  elW,
      height: elH,
      windowWidth:  elW,
      windowHeight: elH,
    });
    noPrint.forEach(e => e.style.visibility = '');

    const { jsPDF } = window.jspdf;
    const pdf     = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
    const margin  = 10;
    const pageW   = 210, pageH = 297;
    const usableW = pageW - margin * 2;          // 190mm
    const usableH = pageH - margin * 2;          // 277mm
    const scale   = usableW / canvas.width;      // mm por pixel
    const totalH  = canvas.height * scale;       // alto total en mm
    const titulo  = `${checkLabel} — ${date}`;

    let fromMM = 0, pageIdx = 0;
    while (fromMM < totalH) {
      if (pageIdx > 0) pdf.addPage();
      // Primera pagina: reserva espacio para el titulo
      const topY    = pageIdx === 0 ? margin + 10 : margin;
      const avail   = pageH - topY - margin;
      const sliceH  = Math.min(avail, totalH - fromMM);
      // Recorta la porcion del canvas correspondiente
      const fromPx  = Math.round(fromMM / scale);
      const slicePx = Math.round(sliceH / scale);
      const slice   = document.createElement('canvas');
      slice.width   = canvas.width;
      slice.height  = slicePx;
      slice.getContext('2d').drawImage(canvas, 0, fromPx, canvas.width, slicePx, 0, 0, canvas.width, slicePx);
      if (pageIdx === 0) {
        pdf.setFontSize(11); pdf.setTextColor(0,83,226);
        pdf.text(titulo, margin, margin + 6);
      }
      pdf.addImage(slice.toDataURL('image/jpeg', 0.82), 'JPEG', margin, topY, usableW, sliceH);
      fromMM += sliceH;
      pageIdx++;
    }

    const fileName = `CheckSAC_${date}_${blockId}.pdf`;
    const pdfBlob  = pdf.output('blob');
    const pdfFile  = new File([pdfBlob], fileName, { type:'application/pdf' });

    if (navigator.canShare && navigator.canShare({ files:[pdfFile] })) {
      await navigator.share({ title:titulo, text:`Check SAC — ${date}`, files:[pdfFile] });
    } else {
      pdf.save(fileName);
      toast('💾 PDF descargado — adjúntalo en WhatsApp');
    }
  } catch(err) {
    if (err.name !== 'AbortError') toast('❌ ' + err.message, 'red');
  } finally {
    btn.textContent = '📲 WhatsApp';
    btn.disabled = false;
  }
}

            <div class="flex-1">
              <p class="text-sm font-semibold ${t.activo?'':'line-through text-gray-400'}">${t.tarea}</p>
              <p class="text-xs text-gray-400 mt-0.5">⏰ ${t.horario||'—'}</p>
            </div>
            <div class="flex gap-1 flex-shrink-0">
              <button onclick="editTask(${t.id},'${cid}','${shift}')" class="px-2 py-1 bg-blue-100 hover:bg-blue-200 text-blue-700 text-xs font-bold rounded-lg">✏️</button>
              <button onclick="toggleTask(${t.id},${t.activo})" class="px-2 py-1 ${t.activo?'bg-yellow-100 hover:bg-yellow-200 text-yellow-700':'bg-green-100 hover:bg-green-200 text-green-700'} text-xs font-bold rounded-lg">${t.activo?'⏸️':'▶️'}</button>
              <button onclick="deleteTask(${t.id})" class="px-2 py-1 bg-red-100 hover:bg-red-200 text-red-600 text-xs font-bold rounded-lg">🗑️</button>
            </div>
          </div>`).join('')}
        </div>
      </div>`;
    }
  }
  el.innerHTML = html;
}

async function seedTasks() {
  if (!confirm('¿Cargar las tareas por defecto en la base de datos?')) return;
  const rows = [];
  let orden = 0;
  for (const [cid, chk] of Object.entries(CHECKS))
    for (const [shift, tasks] of Object.entries(chk.shifts))
      for (const t of tasks)
        rows.push({ check_type:cid, shift, task_id:t.id, horario:t.h, tarea:t.t, orden:orden++, activo:true });
  const { error } = await sb.from('check_tasks').upsert(rows, { onConflict:'task_id' });
  if (error) { toast('❌ '+error.message,'red'); return; }
  toast('✅ Tareas cargadas');
  renderAdmin();
}

function openAddTask(cid, shift) {
  const tarea   = prompt('📝 Nombre de la tarea:');
  if (!tarea?.trim()) return;
  const horario = prompt('⏰ Horario (ej: 09:00–10:00) — opcional:') || '';
  addTask(cid, shift, tarea.trim(), horario.trim());
}

async function addTask(cid, shift, tarea, horario) {
  const task_id = `${cid}_${shift.toLowerCase()}_custom_${Date.now()}`;
  const { error } = await sb.from('check_tasks')
    .insert({ check_type:cid, shift, task_id, horario, tarea, orden:999, activo:true });
  if (error) { toast('❌ '+error.message,'red'); return; }
  toast('✅ Tarea agregada');
  renderAdmin();
}

async function editTask(id, cid, shift) {
  const { data } = await sb.from('check_tasks').select('*').eq('id',id).single();
  if (!data) return;
  const tarea   = prompt('📝 Editar tarea:', data.tarea);
  if (tarea === null) return;
  const horario = prompt('⏰ Editar horario:', data.horario||'');
  if (horario === null) return;
  const { error } = await sb.from('check_tasks').update({ tarea:tarea.trim(), horario:horario.trim() }).eq('id',id);
  if (error) { toast('❌ '+error.message,'red'); return; }
  toast('✅ Tarea actualizada');
  renderAdmin();
}

async function toggleTask(id, activo) {
  const { error } = await sb.from('check_tasks').update({ activo:!activo }).eq('id',id);
  if (error) { toast('❌ '+error.message,'red'); return; }
  toast(activo ? '⏸️ Tarea desactivada' : '▶️ Tarea activada');
  renderAdmin();
}

async function deleteTask(id) {
  if (!confirm('¿Eliminar esta tarea? No se puede deshacer.')) return;
  const { error } = await sb.from('check_tasks').delete().eq('id',id);
  if (error) { toast('❌ '+error.message,'red'); return; }
  toast('🗑️ Tarea eliminada');
  renderAdmin();
}

// Carga tareas de DB (si existen) y sobreescribe CHECKS en memoria
async function loadTasksFromDB() {
  try {
    const { data, error } = await sb.from('check_tasks').select('*').eq('activo',true).order('orden');
    if (error || !data?.length) return; // tabla no existe aun o vacia, usa defaults
    const dbCheckTypes = new Set(data.map(t => t.check_type));
    for (const cid of Object.keys(CHECKS)) {
      if (dbCheckTypes.has(cid)) {
        for (const shift of Object.keys(CHECKS[cid].shifts)) {
          CHECKS[cid].shifts[shift] = [];
        }
      }
    }
    for (const t of data) {
      if (!CHECKS[t.check_type]?.shifts[t.shift]) continue;
      CHECKS[t.check_type].shifts[t.shift].push({ id:t.task_id, h:t.horario||t.shift, t:t.tarea });
    }
  } catch(_) { /* tabla no creada aun, sigue con defaults */ }
}

// ── ADHERENCIA ─────────────────────────────────────────────
const ADH_CHARTS = {};

function renderAdherencia() {
  const el = document.getElementById('view-adherencia');
  const today = new Date().toISOString().slice(0,10);
  const from30 = new Date(Date.now() - 29*86400000).toISOString().slice(0,10);
  el.innerHTML = `
    <div class="flex items-center justify-between mb-5 flex-wrap gap-2">
      <h2 class="text-lg font-black text-[#0053e2]">📊 Resumen de Adherencia</h2>
      <button onclick="showView('check')" class="text-sm text-[#0053e2] font-semibold hover:underline">← Volver</button>
    </div>
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-4 mb-5 flex flex-wrap gap-3 items-end">
      <div>
        <label class="text-xs font-semibold text-gray-500 uppercase block mb-1">Desde</label>
        <input type="date" id="adh-from" value="${from30}"
          class="border border-gray-300 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-[#0053e2] focus:outline-none"/>
      </div>
      <div>
        <label class="text-xs font-semibold text-gray-500 uppercase block mb-1">Hasta</label>
        <input type="date" id="adh-to" value="${today}"
          class="border border-gray-300 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-[#0053e2] focus:outline-none"/>
      </div>
      <button onclick="loadAdh()" class="px-5 py-2 bg-[#0053e2] hover:bg-blue-700 text-white font-bold rounded-xl text-sm">📅 Ver Resumen</button>
    </div>
    <div id="adh-content">
      <p class="text-center text-gray-400 py-8 text-sm">⏳ Cargando…</p>
    </div>`;
  loadAdh();
}

async function loadAdh() {
  const from = document.getElementById('adh-from')?.value;
  const to   = document.getElementById('adh-to')?.value;
  if (!from || !to || from > to) { toast('Rango de fechas inválido', 'red'); return; }

  const el = document.getElementById('adh-content');
  el.innerHTML = '<p class="text-center text-gray-400 py-8">⏳ Cargando datos…</p>';

  Object.values(ADH_CHARTS).forEach(c => c.destroy());
  Object.keys(ADH_CHARTS).forEach(k => delete ADH_CHARTS[k]);

  try {
    const [mainRes, mantRes] = await Promise.all([
      sb.from('check_records')
        .select('check_type,date,shift,task_id,completed')
        .gte('date', from).lte('date', to).order('date'),
      sb.from('check_records')
        .select('date,shift,observation,responsable,updated_at')
        .in('task_id', ['limp_am_08', 'limp_pm_08'])
        .not('observation', 'is', null)
        .neq('observation', '')
        .order('updated_at', { ascending: false })
        .limit(1),
    ]);
    if (mainRes.error) throw mainRes.error;
    const rows    = mainRes.data || [];
    const lastMant = mantRes.data?.[0] || null;

    const dates = [], cur = new Date(from + 'T00:00:00'), end = new Date(to + 'T00:00:00');
    while (cur <= end) { dates.push(cur.toISOString().slice(0,10)); cur.setDate(cur.getDate()+1); }
    const labels = dates.map(d => d.slice(5).replace('-','/'));
    const today  = new Date().toISOString().slice(0,10);

    const pctCls = p => p >= 80 ? 'text-green-700 bg-green-50' : p >= 50 ? 'text-yellow-700 bg-yellow-50' : 'text-red-700 bg-red-50';
    const barCls = p => p >= 80 ? 'bg-green-500' : p >= 50 ? 'bg-yellow-400' : 'bg-red-500';

    function shiftAdh(checkId, shift, dayRows) {
      const tasks  = CHECKS[checkId]?.shifts[shift] || [];
      if (!tasks.length) return null;
      const taskIds = new Set(tasks.map(t => t.id));
      const recs   = dayRows.filter(r => r.check_type===checkId && r.shift===shift && taskIds.has(r.task_id));
      if (!recs.length) return null;
      return Math.round(recs.filter(r => r.completed).length / tasks.length * 100);
    }

    const todayRows = rows.filter(r => r.date === today);
    const SHIFTS_META = [
      { key:'AM', icon:'☀️', label:'Turno AM',  badge:'bg-yellow-100 text-yellow-800', color:'#ffc220' },
      { key:'PM', icon:'🌙', label:'Turno PM',  badge:'bg-indigo-100 text-indigo-700', color:'#0053e2' },
    ];
    const CHECK_STYLE = {
      devoluciones: { border:'border-orange-200', hdr:'bg-orange-50' },
      limpieza:     { border:'border-teal-200',   hdr:'bg-teal-50'   },
    };

    // Global KPIs
    let gDone = 0, gTotal = 0;
    for (const [cid, chk] of Object.entries(CHECKS))
      for (const [sh, tasks] of Object.entries(chk.shifts)) {
        const ids = new Set(tasks.map(t => t.id));
        const rr  = rows.filter(r => r.check_type===cid && r.shift===sh && ids.has(r.task_id));
        gTotal += rr.length;
        gDone  += rr.filter(r => r.completed).length;
      }
    const gPct = gTotal ? Math.round(gDone/gTotal*100) : 0;
    const insightCls = gPct>=80?'bg-green-50 border-green-200 text-green-700':gPct>=50?'bg-yellow-50 border-yellow-200 text-yellow-800':'bg-red-50 border-red-200 text-red-700';
    const insight = gPct>=80?'🎯 <strong>Excelente adherencia.</strong> Sobre el 80% en el período.':gPct>=50?'⚠️ <strong>Adherencia media.</strong> Hay oportunidades de mejora.':'🚨 <strong>Adherencia crítica.</strong> Menos del 50% — acción inmediata.';

    const sections = Object.entries(CHECKS).map(([cid, chk]) => {
      const cc = CHECK_STYLE[cid] || { border:'border-gray-200', hdr:'bg-gray-50' };
      const tableRows = SHIFTS_META.map(sm => {
        const tasks  = chk.shifts[sm.key] || [];
        const taskIds = new Set(tasks.map(t => t.id));
        const recs   = todayRows.filter(r => r.check_type===cid && r.shift===sm.key && taskIds.has(r.task_id));
        const done   = recs.filter(r => r.completed).length;
        const pct    = recs.length ? Math.round(done/tasks.length*100) : null;
        return `<tr class="hover:bg-gray-50">
          <td class="px-4 py-2.5"><span class="text-xs font-bold px-2 py-0.5 rounded-full ${sm.badge}">${sm.icon} ${sm.label}</span></td>
          <td class="px-4 py-2.5 text-center text-gray-500 text-sm">${tasks.length}</td>
          <td class="px-4 py-2.5 text-center text-green-700 font-semibold text-sm">${recs.length?done:'—'}</td>
          <td class="px-4 py-2.5">${pct!==null
            ? `<div class="flex items-center gap-2"><div class="flex-1 bg-gray-200 rounded-full h-2"><div class="h-2 rounded-full ${barCls(pct)}" style="width:${pct}%"></div></div><span class="text-xs font-bold ${pctCls(pct)} px-1.5 py-0.5 rounded w-10 text-center">${pct}%</span></div>`
            : '<span class="text-gray-300 text-sm">— sin datos</span>'}
          </td>
        </tr>`;
      }).join('');
      return `
      <div class="bg-white rounded-2xl shadow-sm border-2 ${cc.border} overflow-hidden mb-5">
        <div class="px-5 py-3 border-b flex items-center gap-2 ${cc.hdr}">
          <span class="text-xl">${chk.icon}</span>
          <h3 class="font-black text-gray-800">${chk.label}</h3>
        </div>
        <div class="p-4">
          <p class="text-xs font-semibold text-gray-500 uppercase mb-2">Hoy (${today})</p>
          <div class="overflow-x-auto mb-5">
            <table class="w-full text-sm">
              <thead class="bg-gray-50 text-xs text-gray-500 uppercase">
                <tr>
                  <th class="px-4 py-2 text-left">Turno</th>
                  <th class="px-4 py-2 text-center">Total tareas</th>
                  <th class="px-4 py-2 text-center">✓ Cumplidas</th>
                  <th class="px-4 py-2 text-left">Adherencia</th>
                </tr>
              </thead>
              <tbody class="divide-y divide-gray-50">${tableRows}</tbody>
            </table>
          </div>
          <p class="text-xs font-semibold text-gray-500 uppercase mb-2">Evolución ${from} → ${to}</p>
          <div style="position:relative;height:260px"><canvas id="adh-chart-${cid}"></canvas></div>
          ${cid === 'limpieza' ? `
          <div class="mt-4 rounded-xl border-2 p-4 ${lastMant
            ? 'bg-blue-50 border-blue-200'
            : 'bg-gray-50 border-gray-200'}">
            <p class="text-xs font-bold uppercase mb-2 ${lastMant ? 'text-blue-600' : 'text-gray-400'}">
              🚿 Última observación — Mantención baños (llaves, tazas, luces)
            </p>
            ${lastMant
              ? `<p class="text-sm text-gray-800 italic mb-2">"​${lastMant.observation}​"</p>
                 <p class="text-xs text-gray-400">
                   📅 ${lastMant.date}
                   &nbsp;·&nbsp; Turno ${lastMant.shift}
                   &nbsp;·&nbsp; 👤 ${lastMant.responsable || '—'}
                 </p>`
              : '<p class="text-sm text-gray-400">Sin observaciones registradas aún.</p>'}
          </div>` : ''}
        </div>
      </div>`;
    }).join('');

    el.innerHTML = `
      <div class="grid grid-cols-3 gap-3 mb-5">
        <div class="bg-white rounded-2xl border shadow-sm p-4 text-center">
          <p class="text-xs text-gray-500 font-semibold uppercase mb-1">Adherencia Global</p>
          <span class="text-4xl font-black inline-block px-3 py-1 rounded-xl ${pctCls(gPct)}">${gPct}%</span>
        </div>
        <div class="bg-white rounded-2xl border shadow-sm p-4 text-center">
          <p class="text-xs text-gray-500 font-semibold uppercase mb-1">✓ Cumplidas</p>
          <p class="text-3xl font-black text-green-600">${gDone}<span class="text-lg text-gray-400">/${gTotal}</span></p>
        </div>
        <div class="bg-white rounded-2xl border shadow-sm p-4 text-center">
          <p class="text-xs text-gray-500 font-semibold uppercase mb-1">📅 Días</p>
          <p class="text-3xl font-black text-gray-700">${dates.length}</p>
        </div>
      </div>
      <div class="border rounded-xl px-4 py-3 text-sm mb-5 ${insightCls}">${insight}</div>
      ${sections}
      ${!rows.length ? '<div class="bg-yellow-50 border border-yellow-200 rounded-xl p-4 text-sm text-yellow-800 text-center">⚠️ No hay registros en este rango de fechas.</div>' : ''}`;

    // Mount charts — grouped bar per shift
    const barColor = p => p === null ? 'rgba(200,200,200,0.4)'
                        : p >= 80   ? 'rgba(42,135,3,0.85)'
                        : p >= 50   ? 'rgba(255,194,32,0.85)'
                        :             'rgba(234,17,0,0.85)';

    Object.entries(CHECKS).forEach(([cid]) => {
      const canvas = document.getElementById('adh-chart-' + cid);
      if (!canvas) return;
      const datasets = SHIFTS_META.map(sm => {
        const data = dates.map(d => shiftAdh(cid, sm.key, rows.filter(r => r.date===d)));
        return {
          label: sm.label,
          data,
          backgroundColor: data.map(barColor),
          borderColor:     data.map(p => p === null ? 'rgba(200,200,200,0.6)'
                                       : p >= 80   ? '#2a8703'
                                       : p >= 50   ? '#b38500'
                                       :             '#ea1100'),
          borderWidth: 1.5,
          borderRadius: 4,
          borderSkipped: false,
        };
      });
      ADH_CHARTS[cid] = new Chart(canvas.getContext('2d'), {
        type: 'bar',
        data: { labels, datasets },
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { position: 'top', labels: { font: { size: 11 }, usePointStyle: true } },
            tooltip: {
              callbacks: {
                label: ctx => ctx.parsed.y === null
                  ? ctx.dataset.label + ': sin datos'
                  : ctx.dataset.label + ': ' + ctx.parsed.y + '%'
              }
            }
          },
          scales: {
            x: {
              ticks: { maxRotation: 45, font: { size: 10 } },
              grid: { display: false }
            },
            y: {
              min: 0, max: 100,
              ticks: { callback: v => v + '%', font: { size: 10 }, stepSize: 20 },
              grid: { color: 'rgba(0,0,0,0.06)' }
            }
          }
        }
      });
    });
  } catch(err) {
    document.getElementById('adh-content').innerHTML =
      `<div class="bg-red-50 border border-red-200 rounded-xl p-6 text-red-700 text-sm"><strong>❌ Error:</strong> ${err.message}</div>`;
  }
}

// ── NAV ────────────────────────────────────────────────
function showView(v) {
  document.getElementById('view-check').classList.toggle('hidden',      v!=='check');
  document.getElementById('view-history').classList.toggle('hidden',    v!=='history');
  document.getElementById('view-admin').classList.toggle('hidden',      v!=='admin');
  document.getElementById('view-adherencia').classList.toggle('hidden', v!=='adherencia');
  if (v==='history')    renderHistory();
  if (v==='check')      renderCheck();
  if (v==='admin')      renderAdmin();
  if (v==='adherencia') renderAdherencia();
}
function onDateChange() { currentDate=document.getElementById('hdr-date').value; renderCheck(); }
function buildTabs() {
  document.getElementById('check-tabs').innerHTML = Object.entries(CHECKS).map(([cid,c])=>
    `<button onclick="switchCheck('${cid}')" class="px-4 py-1.5 rounded-t-lg text-sm font-bold border border-b-0 border-blue-400 ${cid===currentCheck?'tab-active':'bg-blue-700 text-blue-100 hover:bg-blue-600'}">${c.icon} ${c.label.split(' ').slice(0,2).join(' ')}</button>`
  ).join('');
}
function switchCheck(cid) { currentCheck=cid; buildTabs(); renderCheck(); }
function toast(msg, color='green') {
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`fixed bottom-4 right-4 z-50 px-4 py-2 rounded-lg shadow-lg text-sm font-bold text-white ${color==='red'?'bg-red-600':'bg-green-600'}`;
  t.classList.remove('hidden'); setTimeout(()=>t.classList.add('hidden'),3000);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
document.getElementById('hdr-date').value = currentDate;
buildTabs();
// sb ya inicializado arriba via fetch()
document.getElementById('conn-status').textContent = '🟢 En línea';
(async () => {
  await loadTasksFromDB();
  renderCheck();
  setInterval(() => { if (document.visibilityState === 'visible') renderCheck(); }, 300000); // 5 min
})();
</script>
